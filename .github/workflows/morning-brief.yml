name: Morning Brief - TBS Office (09:00 Tbilisi)

on:
  schedule:
    # 05:00 UTC = 09:00 Tbilisi (UTC+4)
    - cron: '0 5 * * *'
  workflow_dispatch:  # allow manual trigger

jobs:
  deliver-morning-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Authenticate with Nova API
        id: auth
        run: |
          RESPONSE=$(curl -s -f -X POST \
            'https://nova-api.gurtam.com/auth/login' \
            -H 'Content-Type: application/json' \
            -d "{\"username\": \"${{ secrets.NOVA_SA_LOGIN }}\", \"password\": \"${{ secrets.NOVA_SA_PASSWORD }}\"}")
          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['access_token'])")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Invoke Morning Brief
        run: |
          RESPONSE=$(curl -s -f -X POST \
            "https://nova-api.gurtam.com/proxy/bots/${{ secrets.NOVA_BOT_ID }}/invoke" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -d '{"query": "Good morning! Please deliver the morning brief for today.", "user_id": "github-actions-cron"}')
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('answer','No answer received'))"
