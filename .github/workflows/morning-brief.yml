name: Morning Brief - TBS Office (Mon & Fri 10:00 Tbilisi)

on:
  schedule:
    # 06:00 UTC = 10:00 Tbilisi (UTC+4), Mon and Fri only
    - cron: '0 6 * * 1,5'
  workflow_dispatch: # allow manual trigger

jobs:
  deliver-morning-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Authenticate with Nova API
        id: auth
        run: |
          JSON_BODY=$(python3 -c "import json; print(json.dumps({'username': '${{ secrets.NOVA_SA_LOGIN }}', 'password': '${{ secrets.NOVA_SA_PASSWORD }}'}))") 
          RESPONSE=$(curl -s -X POST \
            'https://nova-api.gurtam.com/auth/login' \
            -H 'Content-Type: application/json' \
            -d "$JSON_BODY")
          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          if [ -z "$TOKEN" ]; then echo "Auth failed: $RESPONSE"; exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Invoke Morning Brief
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://nova-api.gurtam.com/proxy/bots/${{ secrets.NOVA_BOT_ID }}/invoke" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -d '{"query": "Good morning! Please deliver the morning brief for today to the following Slack users: <@D08N4LB4S2V> (davl), <@D07DLM93GD9> (kmar), <@D07CUKKMSKU> (taku).", "user_id": "github-actions-cron"}')
          echo "=== RAW API RESPONSE ==="
          echo "$RESPONSE"
          echo "=== PARSED ANSWER ==="
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('answer','No answer received'))"
          echo "Morning brief delivered."
